<div id="root"></div>

<script>
/* ============================================================
   THE PRIVATE RESERVE — standalone installable web app
   Data lives in this browser's localStorage (per device).
   To share one catalog/order-book across every customer's phone,
   point the DB_* functions below at a real backend (e.g. Supabase,
   Firebase) instead of localStorage — everything else stays the same.
============================================================ */

const CATEGORIES = ["Cigars","Spirits","Accessories"];
const SHOW_PROPRIETOR_TAB = true; // set to true in the owner's private admin.html copy only
const DEFAULT_CIGAR_ORIGINS = {
  cuban: {
    key: "Cuban", label: "Cuban Cigars",
    brands: ["Cohiba","Montecristo","Romeo y Julieta","Partagás","Bolívar","H. Upmann","Hoyo de Monterrey","Trinidad"],
    hasLines: true,
  },
  davidoff: {
    key: "Davidoff", label: "Davidoff Cigars",
    brands: ["Aniversario","Escurio","Gran Cru","Millennium","Nicaragua","Signature","Winston Churchill","Zino"],
    hasLines: false,
  },
};
const SEED_PRODUCTS = [
  {id:"p1",name:"Vitola Oscuro No. 4",category:"Cigars",price:24,stock:40,description:"Full-bodied Nicaraguan puro, notes of espresso and dark cocoa.",image:""},
  {id:"p2",name:"Reserva Añejo Rum, 12yr",category:"Spirits",price:68,stock:18,description:"Small-batch rum aged in charred oak, caramel and orange peel finish.",image:""},
  {id:"p3",name:"Cedar-Lined Travel Humidor",category:"Accessories",price:145,stock:12,description:"Holds 20 cigars, Spanish cedar interior, brass hygrometer.",image:""},
  {id:"p4",name:"Connecticut Shade Robusto",category:"Cigars",price:16,stock:60,description:"Mild, creamy wrapper, cedar and toasted almond.",image:""},
  {id:"p5",name:"Single Malt, Islay Cask",category:"Spirits",price:92,stock:10,description:"Peat smoke, sea salt, dried fruit — 15 year expression.",image:""},
  {id:"p6",name:"Guillotine Cutter, Brass",category:"Accessories",price:38,stock:25,description:"Double-blade, hand-finished brass housing.",image:""}
];

const SUPABASE_URL = "https://njlrcamdlghcvzkwpbff.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qbHJjYW1kbGdoY3Z6a3dwYmZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1Nzg5MjIsImV4cCI6MjA5OTE1NDkyMn0.ul4nyNg2Lbwl3LKJ2qW6ogOw_xkgNYRwuAApOHO8CKI";
const SHARED_KEYS = ["pr_products","pr_members","pr_invites","pr_orders","pr_home_links","pr_cigar_brand_images","pr_cigar_origins"];

function sbHeaders(extra){
  return Object.assign({
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    "Content-Type": "application/json"
  }, extra || {});
}
async function sbFetchAll(){
  const url = `${SUPABASE_URL}/rest/v1/app_data?select=key,value&key=in.(${SHARED_KEYS.join(",")})`;
  const res = await fetch(url, { headers: sbHeaders() });
  if(!res.ok) throw new Error("Supabase fetch failed: " + res.status);
  const rows = await res.json();
  const map = {};
  rows.forEach(r => map[r.key] = r.value);
  return map;
}
async function sbUpsert(key, value){
  const url = `${SUPABASE_URL}/rest/v1/app_data?on_conflict=key`;
  const res = await fetch(url, {
    method: "POST",
    headers: sbHeaders({ "Prefer": "resolution=merge-duplicates,return=minimal" }),
    body: JSON.stringify([{ key, value }])
  });
  if(!res.ok) throw new Error("Supabase upsert failed: " + res.status);
}
async function pushShared(){
  if(!ADMIN_PASSCODE){
    console.error("pushShared called without an authenticated admin session");
    flash("Not authorized to save changes.", "err");
    return;
  }
  try{
    const updates = {
      pr_products: STATE.products,
      pr_members: STATE.members,
      pr_invites: STATE.invites,
      pr_orders: STATE.orders,
      pr_home_links: STATE.homeLinks,
      pr_cigar_brand_images: STATE.cigarBrandImages,
      pr_cigar_origins: STATE.cigarOrigins,
    };
    const res = await fetch("/.netlify/functions/admin-write", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ passcode: ADMIN_PASSCODE, updates }),
    });
    const data = await res.json();
    if(!data.ok){
      flash(data.error || "Couldn't save changes.", "err");
      return;
    }
    dbSet("pr_products", STATE.products); dbSet("pr_members", STATE.members);
    dbSet("pr_invites", STATE.invites); dbSet("pr_orders", STATE.orders);
    dbSet("pr_home_links", STATE.homeLinks);
    dbSet("pr_cigar_brand_images", STATE.cigarBrandImages); dbSet("pr_cigar_origins", STATE.cigarOrigins);
  }catch(e){
    console.error("sync failed", e);
    flash("Couldn't sync to the server — changes saved on this device only for now.", "err");
  }
}
async function pullShared(showFlash){
  try{
    const remote = await sbFetchAll();
    if(remote.pr_products) STATE.products = remote.pr_products;
    if(remote.pr_members) STATE.members = remote.pr_members;
    if(remote.pr_invites) STATE.invites = remote.pr_invites;
    if(remote.pr_orders) STATE.orders = remote.pr_orders;
    if(remote.pr_home_links) STATE.homeLinks = remote.pr_home_links;
    if(remote.pr_cigar_brand_images) STATE.cigarBrandImages = remote.pr_cigar_brand_images;
    if(remote.pr_cigar_origins) STATE.cigarOrigins = remote.pr_cigar_origins;
    dbSet("pr_products", STATE.products); dbSet("pr_members", STATE.members);
    dbSet("pr_invites", STATE.invites); dbSet("pr_orders", STATE.orders);
    dbSet("pr_home_links", STATE.homeLinks);
    dbSet("pr_cigar_brand_images", STATE.cigarBrandImages); dbSet("pr_cigar_origins", STATE.cigarOrigins);
    if(showFlash) flash("Refreshed.");
    return true;
  }catch(e){
    console.error("pull failed", e);
    if(showFlash) flash("Couldn't reach the server — showing the last saved copy.", "err");
    return false;
  }
}

const money = n => "$" + Number(n).toFixed(2);
const byName = arr => arr.slice().sort((a,b)=>a.localeCompare(b, undefined, {sensitivity:"base", numeric:true}));
const productsByName = arr => arr.slice().sort((a,b)=>a.name.localeCompare(b.name, undefined, {sensitivity:"base", numeric:true}));

function imageField(hiddenId, currentValue, label){
  return `
    <div class="field">
      <label>${esc(label)}</label>
      <input type="file" accept="image/*" data-img-target="${hiddenId}"/>
      <input type="hidden" id="${hiddenId}" value="${esc(currentValue||'')}"/>
      <div class="img-preview" id="${hiddenId}-preview">${currentValue?`<img src="${esc(currentValue)}"/>`:""}</div>
    </div>`;
}

function handleImageFile(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const targetId = e.target.dataset.imgTarget;
  const preview = document.getElementById(targetId+"-preview");
  if(preview) preview.innerHTML = `<span style="font-size:11px;color:var(--muted)">Processing photo…</span>`;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxDim = 900;
      let w = img.width, h = img.height;
      if(w > maxDim || h > maxDim){
        if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.72);
      const hidden = document.getElementById(targetId);
      if(hidden) hidden.value = dataUrl;
      if(preview) preview.innerHTML = `<img src="${dataUrl}"/>`;
    };
    img.onerror = function(){ if(preview) preview.innerHTML = `<span style="font-size:11px;color:var(--bad)">Couldn't read that photo.</span>`; };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const genCode = () => Array.from({length:8},()=> "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"[Math.floor(Math.random()*32)]).join("");
const genId = p => p+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const genOrderNo = () => "PR-"+Math.floor(100000+Math.random()*900000);

/* ---- storage layer (swap for a real backend later) ---- */
function dbGet(key, fallback){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } }
function dbSet(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ console.error(e); } }

const DEFAULT_HOME_LINKS = [
  { image: "", label: "Cigars", category: "Cigars" },
  { image: "", label: "Spirits", category: "Spirits" },
  { image: "", label: "Accessories", category: "Accessories" },
  { image: "", label: "", target: "" },
  { image: "", label: "", target: "" },
  { image: "", label: "", target: "" },
  { image: "", label: "", target: "" },
  { image: "", label: "", target: "" },
];

let ADMIN_PASSCODE = null; // held in memory only for this session, never persisted — authorizes writes

let STATE = {
  products: dbGet("pr_products", null) || SEED_PRODUCTS,
  members: dbGet("pr_members", {}),
  invites: dbGet("pr_invites", {}),
  orders: dbGet("pr_orders", []),
  adminPass: dbGet("pr_admin_pass", "humidor21"),
  homeLinks: dbGet("pr_home_links", null) || DEFAULT_HOME_LINKS,
  cigarBrandImages: dbGet("pr_cigar_brand_images", {}),
  cigarOrigins: dbGet("pr_cigar_origins", null) || JSON.parse(JSON.stringify(DEFAULT_CIGAR_ORIGINS)),
  cigarNav: { level: "root", originKey: null, brand: null, line: null },
  searchQuery: "",
  session: dbGet("pr_session", null),
  gateTab: "signin",
  storeScreen: "shop",
  category: "Home",
  cart: {},
  adminTab: "products",
  lastOrder: null,
  toast: null,
  productForm: null, // editing product id or null
};
if(!dbGet("pr_products", null)) dbSet("pr_products", SEED_PRODUCTS);
if(!dbGet("pr_home_links", null)) dbSet("pr_home_links", DEFAULT_HOME_LINKS);
if(!dbGet("pr_cigar_origins", null)) dbSet("pr_cigar_origins", STATE.cigarOrigins);

function persist(){
  dbSet("pr_session", STATE.session); // session stays local to this device on purpose
  if(ADMIN_PASSCODE){
    pushShared(); // fire-and-forget sync of shared data to Supabase — admin sessions only
  } else if(STATE.session && STATE.session.type === "admin"){
    // Session says admin, but there's no passcode in memory to authorize the save.
    // Never fail silently here — send them back to log in properly instead.
    STATE.session = null;
    dbSet("pr_session", null);
    flash("Your session needs to be refreshed — please log in again.", "err");
    render();
  }
}
function flash(msg, kind){
  STATE.toast = {msg, kind: kind||"ok"};
  render();
  setTimeout(()=>{
    STATE.toast = null;
    const t = document.getElementById("toast-el");
    if(t) t.remove(); else render();
  }, 3000);
}
function setState(patch){ Object.assign(STATE, patch); persist(); render(); }

// Wires the phone/browser's native Back and Forward controls to the app's own
// navigation (category, cigar drill-down, cart/checkout) instead of leaving the
// site entirely. Forward moves push a new entry; our own "Back" buttons just
// call history.back() so both native and in-app back stay in sync.
function navSnapshot(){
  return { category: STATE.category, cigarNav: STATE.cigarNav, storeScreen: STATE.storeScreen };
}
function pushNavState(){
  try{ history.pushState(navSnapshot(), "", location.href); }catch(e){}
}
window.addEventListener("popstate", (e)=>{
  if(!STATE.session) return; // gate screen has nothing to navigate
  if(e.state){
    STATE.category = e.state.category;
    STATE.cigarNav = e.state.cigarNav;
    STATE.storeScreen = e.state.storeScreen;
  } else {
    STATE.category = "Home";
    STATE.cigarNav = { level: "root", originKey: null, brand: null, line: null };
    STATE.storeScreen = "shop";
  }
  render();
});

/* ---------- STORE ---------- */
function cartItems(){
  return Object.entries(STATE.cart).map(([key,qty])=>{
    const idx = key.lastIndexOf("__");
    const id = idx === -1 ? key : key.slice(0, idx);
    const variant = idx === -1 ? "single" : key.slice(idx+2);
    const product = STATE.products.find(p=>p.id===id);
    if(!product) return null;
    const isBox = variant === "box";
    const unitPrice = isBox ? Number(product.boxPrice)||0 : product.price;
    const variantLabel = isBox ? (product.boxLabel || "Box") : null;
    return { key, product, qty, variant, unitPrice, variantLabel };
  }).filter(Boolean);
}
function cartCount(){ return cartItems().reduce((s,c)=>s+c.qty,0); }
function cartTotal(){ return cartItems().reduce((s,c)=>s+c.qty*c.unitPrice,0); }
const DELIVERY_THRESHOLD = 300;
const DELIVERY_FEE = 10;
function deliveryFee(){ return cartTotal() >= DELIVERY_THRESHOLD ? 0 : DELIVERY_FEE; }
function grandTotal(){ return cartTotal() + deliveryFee(); }

function productCard(p){
  const hasBox = p.boxPrice && p.boxPrice > 0;
  const singleKey = `${p.id}__single`;
  const singleQty = STATE.cart[singleKey] || 0;
  const totalInCart = (STATE.cart[`${p.id}__single`]||0) + (STATE.cart[`${p.id}__box`]||0);
  const singleControl = p.stock===0
    ? `<div class="add-btn" style="opacity:.5;text-align:center;cursor:default">Sold Out</div>`
    : singleQty === 0
      ? `<button class="add-btn" data-act="addcart" data-val="${p.id}" data-variant="single">${hasBox?`Single – ${money(p.price)}`:"+ Add"}</button>`
      : `<div class="qty-stepper-row">
          <button class="qty-btn" data-act="qty" data-id="${singleKey}" data-delta="-1">−</button>
          <span class="qty-stepper-val">${singleQty}</span>
          <button class="qty-btn" data-act="qty" data-id="${singleKey}" data-delta="1" ${totalInCart>=p.stock?"disabled":""}>+</button>
        </div>`;
  const addBtns = hasBox
    ? `<div class="add-btn-row">
        ${singleControl}
        <button class="add-btn" data-act="addcart" data-val="${p.id}" data-variant="box" ${p.stock===0?"disabled":""}>${p.stock===0?"Sold Out":`${esc(p.boxLabel||"Box")} – ${money(p.boxPrice)}`}</button>
      </div>`
    : singleControl;
  return `
    <div class="p-card">
      <div class="p-img">${p.image?`<img src="${esc(p.image)}" style="width:100%;height:100%;object-fit:cover"/>`: (p.category==="Cigars"?"🚬":p.category==="Spirits"?"🥃":"📦")}</div>
      <div class="p-title">${esc(p.name)}</div>
      <div class="p-desc">${esc(p.description)}</div>
      <div class="p-foot">
        <span class="p-price">${money(p.price)}</span>
      </div>
      ${addBtns}
    </div>`;
}

function originUsesBrands(dictKey){ return dictKey === "cuban" || dictKey === "davidoff"; }

function cigarBreadcrumb(){
  const nav = STATE.cigarNav;
  const origin = nav.originKey ? STATE.cigarOrigins[nav.originKey] : null;
  const parts = [];
  parts.push(`<button class="crumb-btn" data-act="cigarnav" data-val="root">Cigars</button>`);
  if(origin){
    parts.push(`<button class="crumb-btn" data-act="cigarnav" data-val="origin" data-origin="${esc(nav.originKey)}">${esc(origin.label)}</button>`);
  }
  if(nav.brand){
    parts.push(`<button class="crumb-btn" data-act="cigarnav" data-val="brand" data-origin="${esc(nav.originKey)}" data-brand="${esc(nav.brand)}">${esc(nav.brand)}</button>`);
  }
  if(nav.level==="products" && nav.line){
    parts.push(`<span class="crumb-current">${esc(nav.line)}</span>`);
  }
  return `<div class="breadcrumb">
    <button class="back-link" data-act="navback">← Back</button>
    <div class="crumb-row">${parts.join('<span class="crumb-sep">›</span>')}</div>
  </div>`;
}

function cigarCatRow(){
  return `<div class="cat-row">
    ${["Home",...CATEGORIES].map(c=>`<button class="cat-btn ${STATE.category===c?'active':''}" data-act="setcat" data-val="${c}">${esc(c)}</button>`).join("")}
  </div>`;
}

function renderCigarsPage(){
  const nav = STATE.cigarNav;
  const cigars = STATE.products.filter(p=>p.category==="Cigars");
  const originKeys = Object.keys(STATE.cigarOrigins);

  if(nav.level === "root"){
    const taggedOrigins = originKeys.map(k=>STATE.cigarOrigins[k].key.toLowerCase());
    const other = productsByName(cigars.filter(p=>!taggedOrigins.includes((p.cigarOrigin||"").trim().toLowerCase())));
    return `
      ${cigarCatRow()}
      <div class="origin-row">
        ${originKeys.map(k=>`<button class="origin-btn" data-act="cigarnav" data-val="origin" data-origin="${k}">${esc(STATE.cigarOrigins[k].label)}</button>`).join("")}
      </div>
      <div class="grid">
        ${other.map(p=>productCard(p)).join("") || `<div class="empty" style="grid-column:1/-1">No other cigars listed yet.</div>`}
      </div>`;
  }

  const origin = STATE.cigarOrigins[nav.originKey];
  if(!origin) return "";

  if(nav.level === "origin"){
    if(originUsesBrands(nav.originKey)){
      return `
        ${cigarCatRow()}
        ${cigarBreadcrumb()}
        <div class="home-links-grid">
          ${byName(origin.brands).map(b=>{
            const img = (STATE.cigarBrandImages||{})[b] || "";
            return `<button class="home-link-box" data-act="cigarnav" data-val="brand" data-origin="${nav.originKey}" data-brand="${esc(b)}">
              <div class="home-link-img">${img?`<img src="${esc(img)}" style="width:100%;height:100%;object-fit:cover"/>`:`<span class="p-img-fallback">🚬</span>`}</div>
              <div class="home-link-label">${esc(b)}</div>
            </button>`;
          }).join("")}
        </div>`;
    }
    // Other origins skip brand and line entirely — products show right on the origin page.
    const originCigars = productsByName(cigars.filter(p=>(p.cigarOrigin||"").trim().toLowerCase()===origin.key.toLowerCase()));
    return `
      ${cigarCatRow()}
      ${cigarBreadcrumb()}
      <div class="grid">
        ${originCigars.map(p=>productCard(p)).join("") || `<div class="empty" style="grid-column:1/-1">No products added for ${esc(origin.label)} yet — add one in the Back Office and set its Origin to "${esc(origin.key)}".</div>`}
      </div>`;
  }

  if(nav.level === "brand"){
    // Only origins with hasLines land here; group that brand's products by Line.
    const brandCigars = cigars.filter(p=>(p.cigarOrigin||"").trim().toLowerCase()===origin.key.toLowerCase() && p.cigarBrand===nav.brand);
    const lines = byName([...new Set(brandCigars.map(p=>p.cigarLine).filter(Boolean))]);
    return `
      ${cigarCatRow()}
      ${cigarBreadcrumb()}
      <div class="home-links-grid">
        ${lines.map(line=>{
          const sample = brandCigars.find(p=>p.cigarLine===line);
          return `<button class="home-link-box" data-act="cigarnav" data-val="line" data-line="${esc(line)}">
            <div class="home-link-img">${sample&&sample.image?`<img src="${esc(sample.image)}" style="width:100%;height:100%;object-fit:cover"/>`:`<span class="p-img-fallback">🚬</span>`}</div>
            <div class="home-link-label">${esc(line)}</div>
          </button>`;
        }).join("") || `<div class="empty" style="grid-column:1/-1">No lines added for ${esc(nav.brand)} yet — add products in the Back Office and tag them with this brand.</div>`}
      </div>`;
  }

  if(nav.level === "products"){
    const filtered = productsByName(cigars.filter(p=>{
      if((p.cigarOrigin||"").trim().toLowerCase() !== origin.key.toLowerCase()) return false;
      if(nav.brand && p.cigarBrand !== nav.brand) return false;
      if(nav.line && p.cigarLine !== nav.line) return false;
      return true;
    }));
    return `
      ${cigarCatRow()}
      ${cigarBreadcrumb()}
      <div class="grid">
        ${filtered.map(p=>productCard(p)).join("") || `<div class="empty" style="grid-column:1/-1">No products added here yet.</div>`}
      </div>`;
  }
  return "";
}

    ${STATE.searchQuery ? `<button class="icon-btn" data-act="clearsearch" title="Clear">✕</button>` : `<button class="icon-btn" data-act="dosearch" title="Search">🔍</button>`}

      ${items.length===0? `<div class="empty">Your cart is empty.</div>` : items.map(c=>`
        <div class="cart-row">
          <div><div class="cart-row-name">${esc(c.product.name)}${c.variantLabel?` <span class="cart-row-sub">(${esc(c.variantLabel)})</span>`:""}</div><div class="cart-row-sub">${money(c.unitPrice)} each</div></div>
          <div class="qty-group">
            <button class="qty-btn" data-act="qty" data-id="${c.key}" data-delta="-1">−</button>

      ${items.length>0? `

        <div class="cart-row" style="border-bottom:none"><span class="cart-row-sub">Delivery</span><span class="cart-row-sub" style="${deliveryFee()===0?'color:var(--good)':''}">${deliveryFee()===0?"FREE":money(deliveryFee())}</span></div>
        <div class="total-row"><span>Total</span><span>${money(grandTotal())}</span></div>
        <button class="primary-btn" data-act="gostore" data-val="checkout">Proceed to Checkout →</button>
      `:""}
    </div>`;
  } else if(STATE.storeScreen === "checkout"){
    body = `<div class="panel">
      <button class="back-link" data-act="navback">← Back to cart</button>
      <h2 class="panel-title">Checkout</h2>

function buildHomeLinkOptions(selectedTarget){
  let html = `<option value="">— not linked yet —</option>`;
  html += `<optgroup label="Category">` + CATEGORIES.map(c=>{
    const v = `category:${c}`;
    return `<option value="${esc(v)}" ${selectedTarget===v?'selected':''}>${esc(c)}</option>`;
  }).join("") + `</optgroup>`;
  html += `<optgroup label="Cigar Origin">` + Object.entries(STATE.cigarOrigins).map(([k,o])=>{
    const v = `origin:${k}`;
    return `<option value="${esc(v)}" ${selectedTarget===v?'selected':''}>${esc(o.label)}</option>`;
  }).join("") + `</optgroup>`;
  Object.entries(STATE.cigarOrigins).forEach(([k,o])=>{
    if(o.brands && o.brands.length && originUsesBrands(k)){
      html += `<optgroup label="${esc(o.label)} — Brand">` + o.brands.map(b=>{
        const v = `brand:${k}:${b}`;
        return `<option value="${esc(v)}" ${selectedTarget===v?'selected':''}>${esc(b)}</option>`;
      }).join("") + `</optgroup>`;
    }
  });
  if(STATE.products.length){
    html += `<optgroup label="Specific Product">` + STATE.products.map(p=>{
      const v = `product:${p.id}`;
      return `<option value="${esc(v)}" ${selectedTarget===v?'selected':''}>${esc(p.name)}</option>`;
    }).join("") + `</optgroup>`;
  }
  return html;
}

// Resolves a home-link target string into the store navigation state it should land on.
function resolveHomeLinkTarget(target){
  if(!target) return;
  const [type, a, b] = target.split(":");
  if(type === "category"){
    STATE.category = a;
    STATE.cigarNav = { level: "root", originKey: null, brand: null, line: null };
  } else if(type === "origin"){
    STATE.category = "Cigars";
    STATE.cigarNav = { level: "origin", originKey: a, brand: null, line: null };
  } else if(type === "brand"){
    const origin = STATE.cigarOrigins[a];
    STATE.category = "Cigars";
    STATE.cigarNav = origin && origin.hasLines
      ? { level: "brand", originKey: a, brand: b, line: null }
      : { level: "products", originKey: a, brand: b, line: null };
  } else if(type === "product"){
    const p = STATE.products.find(pp=>pp.id===a);
    if(!p) return;
    STATE.category = p.category;
    if(p.category === "Cigars"){
      const originEntry = Object.entries(STATE.cigarOrigins).find(([,o])=>o.key.toLowerCase()===(p.cigarOrigin||"").trim().toLowerCase());
      if(originEntry){
        const [originDictKey, origin] = originEntry;
        if(originUsesBrands(originDictKey) && p.cigarBrand){
          STATE.cigarNav = origin.hasLines
            ? { level: "brand", originKey: originDictKey, brand: p.cigarBrand, line: null }
            : { level: "products", originKey: originDictKey, brand: p.cigarBrand, line: p.cigarLine || null };
        } else if(!originUsesBrands(originDictKey)){
          STATE.cigarNav = { level: "products", originKey: originDictKey, brand: null, line: p.cigarLine || null };
        } else {
          STATE.cigarNav = { level: "root", originKey: null, brand: null, line: null };
        }
      } else {
        STATE.cigarNav = { level: "root", originKey: null, brand: null, line: null };
      }
    } else {
      STATE.cigarNav = { level: "root", originKey: null, brand: null, line: null };
    }
  }
}

/* ================= EVENTS ================= */
function bindEvents(){
  document.querySelectorAll("[data-act]").forEach(el=>{
    el.addEventListener(el.tagName==="SELECT"?"change":"click", handleAction);
  });
  document.querySelectorAll('input[type="file"][data-img-target]').forEach(el=>{
    el.addEventListener("change", handleImageFile);
  });
  const searchInput = document.getElementById("search-input");
  if(searchInput){
    searchInput.addEventListener("keydown", e=>{
      if(e.key === "Enter"){ STATE.searchQuery = searchInput.value.trim(); render(); }
    });
  }
}

const SHARED_MUTATING_ACTIONS = new Set([
  "saveproduct","delproduct","togglemember","geninvite","revokeinvite",
  "orderstatus","savehomelinks","addhomebox","delhomebox",
  "addorigin","delorigin","togglelines","addbrand","delbrand","savecigarbrands",
]);

async function handleAction(e){
  const el = e.currentTarget;
  const act = el.dataset.act;
  const val = el.dataset.val;

  // Before any save that touches shared data, pull the freshest copy from the
  // server first. Without this, a browser tab left open a while could push a
  // stale, incomplete product list and silently overwrite newer changes made
  // elsewhere — this closes that gap.
  if(SHARED_MUTATING_ACTIONS.has(act) && ADMIN_PASSCODE){
    await pullShared(false);
  }

  if(act==="gatetab"){ STATE.gateTab = val; STATE.toast=null; render(); }

  else if(act==="signin"){
    const email = document.getElementById("in-email").value.trim().toLowerCase();
    const pass = document.getElementById("in-pass").value;
    const btn = el; btn.disabled = true;
    fetch("/.netlify/functions/member-auth", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ action: "signin", email, password: pass }),
    }).then(r=>r.json()).then(data=>{
      btn.disabled = false;
      if(!data.ok) return flash(data.error || "Couldn't sign in.", "err");
      setState({session:{type:"member", email:data.member.email, name:data.member.name}, storeScreen:"shop"});
      try{ history.replaceState(navSnapshot(), "", location.href); }catch(err){}
      pullShared(false).then(()=>render());
    }).catch(()=>{ btn.disabled = false; flash("Couldn't reach the server. Try again.", "err"); });
  }

  else if(act==="redeem"){
    const code = document.getElementById("rd-code").value.trim().toUpperCase();
    const name = document.getElementById("rd-name").value.trim();
    const email = document.getElementById("rd-email").value.trim().toLowerCase();
    const pass = document.getElementById("rd-pass").value;
    const btn = el; btn.disabled = true;
    fetch("/.netlify/functions/member-auth", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ action: "redeem", code, name, email, password: pass }),
    }).then(r=>r.json()).then(data=>{
      btn.disabled = false;
      if(!data.ok) return flash(data.error || "Couldn't activate membership.", "err");
      setState({session:{type:"member", email:data.member.email, name:data.member.name}, storeScreen:"shop"});
      try{ history.replaceState(navSnapshot(), "", location.href); }catch(err){}
      flash("Membership activated. Welcome in.");
      pullShared(false).then(()=>render());
    }).catch(()=>{ btn.disabled = false; flash("Couldn't reach the server. Try again.", "err"); });
  }

  else if(act==="adminlogin"){
    const pass = document.getElementById("ad-pass").value;
    const btn = el; btn.disabled = true;
    fetch("/.netlify/functions/admin-auth", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ action: "check", passcode: pass }),
    }).then(r=>r.json()).then(data=>{
      btn.disabled = false;
      if(!data.ok) return flash(data.error || "Incorrect proprietor passcode.", "err");
      ADMIN_PASSCODE = pass;
      setState({session:{type:"admin"}, adminTab:"products"});
      try{ history.replaceState(navSnapshot(), "", location.href); }catch(err){}
      pullShared(false).then(()=>render());
    }).catch(()=>{ btn.disabled = false; flash("Couldn't reach the server. Try again.", "err"); });
  }

  else if(act==="logout"){ ADMIN_PASSCODE = null; setState({session:null, cart:{}}); }

  else if(act==="refresh"){ pullShared(true).then(()=>render()); }

  else if(act==="gostore"){ STATE.storeScreen = val; pushNavState(); render(); }
  else if(act==="setcat"){ STATE.category = val; STATE.cigarNav = { level: "root", originKey: null, brand: null, line: null }; STATE.searchQuery = ""; pushNavState(); render(); }
  else if(act==="dosearch"){ STATE.searchQuery = document.getElementById("search-input").value.trim(); render(); }
  else if(act==="clearsearch"){ STATE.searchQuery = ""; render(); }
  else if(act==="homelinkgo"){ resolveHomeLinkTarget(el.dataset.target); pushNavState(); render(); }

  else if(act==="cigarnav"){
    const nav = STATE.cigarNav;
    if(val==="root"){
      STATE.cigarNav = { level: "root", originKey: null, brand: null, line: null };
    } else if(val==="origin"){
      STATE.cigarNav = { level: "origin", originKey: el.dataset.origin, brand: null, line: null };
    } else if(val==="brand"){
      const originKey = el.dataset.origin || nav.originKey;
      const origin = STATE.cigarOrigins[originKey];
      STATE.cigarNav = origin && origin.hasLines
        ? { level: "brand", originKey, brand: el.dataset.brand, line: null }
        : { level: "products", originKey, brand: el.dataset.brand, line: null };
    } else if(val==="line"){
      STATE.cigarNav = { level: "products", originKey: nav.originKey, brand: nav.brand, line: el.dataset.line };
    }
    pushNavState();
    render();
  }
  else if(act==="navback"){ history.back(); }

  else if(act==="addcart"){
    const p = STATE.products.find(pp=>pp.id===val);
    if(!p) return;
    const variant = el.dataset.variant || "single";
    const key = `${val}__${variant}`;
    const totalInCart = (STATE.cart[`${val}__single`]||0) + (STATE.cart[`${val}__box`]||0);
    if(totalInCart >= p.stock) return flash("No more in stock.","err");
    STATE.cart[key] = (STATE.cart[key]||0)+1;
    render();
  }
  else if(act==="qty"){
    const id = el.dataset.id, delta = parseInt(el.dataset.delta,10);
    if(delta > 0){
      const idx = id.lastIndexOf("__");
      const productId = idx===-1 ? id : id.slice(0, idx);
      const product = STATE.products.find(pp=>pp.id===productId);
      const totalInCart = (STATE.cart[`${productId}__single`]||0) + (STATE.cart[`${productId}__box`]||0);
      if(product && totalInCart >= product.stock) return flash("No more in stock.","err");
    }
    const v = (STATE.cart[id]||0)+delta;
    if(v<=0) delete STATE.cart[id]; else STATE.cart[id]=v;
    render();
  }

  else if(act==="stripepay"){
    const items = cartItems();
    if(items.length===0) return flash("Your cart is empty.","err");
    const btn = document.getElementById("pay-btn"); btn.disabled=true; btn.textContent="Redirecting to secure checkout…";
    fetch("/.netlify/functions/create-checkout", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        items: items.map(c=>({id:c.product.id, variant:c.variant, qty:c.qty})),
        memberEmail: STATE.session.email,
        memberName: STATE.session.name,
        siteUrl: window.location.origin,
      }),
    })
    .then(r=>r.json())
    .then(data=>{
      if(data.url) window.location.href = data.url;
      else { flash(data.error || "Couldn't start checkout.","err"); btn.disabled=false; btn.textContent="Pay "+money(grandTotal())+" Securely"; }
    })
    .catch(()=>{ flash("Couldn't reach the payment service.","err"); btn.disabled=false; btn.textContent="Pay "+money(grandTotal())+" Securely"; });
  }

  else if(act==="admintab"){ STATE.adminTab = val; STATE.productForm=null; render(); }

  else if(act==="editproduct"){ STATE.productForm = val; render(); }
  else if(act==="canceledit"){ STATE.productForm = null; render(); }
  else if(act==="delproduct"){
    if(!confirm("Delete this product? This can't be undone.")) return;
    STATE.products = STATE.products.filter(p=>p.id!==val);
    if(STATE.productForm===val) STATE.productForm=null;
    setState({}); flash("Product removed.");
  }
  else if(act==="saveproduct"){
    const name = document.getElementById("pf-name").value.trim();
    const category = document.getElementById("pf-cat").value;
    const price = parseFloat(document.getElementById("pf-price").value);
    const stock = parseInt(document.getElementById("pf-stock").value,10)||0;
    const boxPriceRaw = document.getElementById("pf-boxprice").value.trim();
    const boxPrice = boxPriceRaw ? parseFloat(boxPriceRaw) : null;
    const boxLabel = document.getElementById("pf-boxlabel").value.trim();
    const image = document.getElementById("pf-img").value.trim();
    const description = document.getElementById("pf-desc").value.trim();
    const cigarOrigin = document.getElementById("pf-origin").value.trim();
    const cigarBrand = document.getElementById("pf-brand").value;
    const cigarLine = document.getElementById("pf-line").value.trim();
    if(!name || isNaN(price)) return flash("Name and price are required.","err");
    if(boxPriceRaw && isNaN(boxPrice)) return flash("Box price must be a number.","err");
    if(val){
      STATE.products = STATE.products.map(p=>p.id===val?{...p,name,category,price,stock,boxPrice,boxLabel,image,description,cigarOrigin,cigarBrand,cigarLine}:p);
      flash("Product updated.");
    } else {
      STATE.products = [{id:genId("prod"),name,category,price,stock,boxPrice,boxLabel,image,description,cigarOrigin,cigarBrand,cigarLine}, ...STATE.products];
      flash("Product added.");
    }
    STATE.productForm = null;
    setState({});
  }

  else if(act==="orderstatus"){
    const id = el.dataset.val, status = el.value;
    STATE.orders = STATE.orders.map(o=>o.id===id?{...o,status}:o);
    setState({});
  }

  else if(act==="togglemember"){
    const email = val;
    STATE.members[email] = {...STATE.members[email], active: !STATE.members[email].active};
    setState({});
  }

  else if(act==="geninvite"){
    const code = genCode();
    STATE.invites[code] = {used:false, createdAt:Date.now()};
    setState({});
  }
  else if(act==="revokeinvite"){
    delete STATE.invites[val];
    setState({});
  }

  else if(act==="savepass"){
    const current = document.getElementById("set-pass-current").value;
    const next = document.getElementById("set-pass-new").value;
    if(next.length<4) return flash("New passcode must be at least 4 characters.","err");
    const btn = el; btn.disabled = true;
    fetch("/.netlify/functions/admin-auth", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ action: "set", currentPasscode: current, newPasscode: next }),
    }).then(r=>r.json()).then(data=>{
      btn.disabled = false;
      if(!data.ok) return flash(data.error || "Couldn't update passcode.", "err");
      ADMIN_PASSCODE = next;
      flash("Passcode updated.");
      render();
    }).catch(()=>{ btn.disabled = false; flash("Couldn't reach the server. Try again.", "err"); });
  }

  else if(act==="savehomelinks"){
    const links = (STATE.homeLinks || DEFAULT_HOME_LINKS).map((l,i)=>{
      const label = document.querySelector(`[data-hl-field="label"][data-hl-index="${i}"]`).value.trim();
      const image = document.getElementById(`hl-img-${i}`).value.trim();
      const target = document.querySelector(`[data-hl-field="target"][data-hl-index="${i}"]`).value;
      return { label, image, target };
    });
    STATE.homeLinks = links;
    setState({});
    flash("Home page updated.");
  }
  else if(act==="addhomebox"){
    STATE.homeLinks = [...(STATE.homeLinks || DEFAULT_HOME_LINKS), { label: "", image: "", target: "" }];
    setState({});
  }
  else if(act==="delhomebox"){
    const i = parseInt(val, 10);
    STATE.homeLinks = (STATE.homeLinks || DEFAULT_HOME_LINKS).filter((_,idx)=>idx!==i);
    setState({});
  }

  else if(act==="addorigin"){
    const name = document.getElementById("new-origin-name").value.trim();
    if(!name) return flash("Enter an origin name.","err");
    let dictKey = name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
    if(!dictKey) dictKey = "origin";
    let uniqueKey = dictKey, n = 2;
    while(STATE.cigarOrigins[uniqueKey]){ uniqueKey = `${dictKey}-${n}`; n++; }
    STATE.cigarOrigins = { ...STATE.cigarOrigins, [uniqueKey]: { key: name, label: `${name} Cigars`, brands: [], hasLines: false } };
    setState({});
    flash(`"${name} Cigars" added.`);
  }
  else if(act==="delorigin"){
    if(!confirm("Delete this origin? Products already tagged with it will keep their tag but won't show under a category card until reassigned.")) return;
    const next = { ...STATE.cigarOrigins };
    delete next[val];
    STATE.cigarOrigins = next;
    setState({});
    flash("Origin deleted.");
  }
  else if(act==="togglelines"){
    STATE.cigarOrigins = { ...STATE.cigarOrigins, [val]: { ...STATE.cigarOrigins[val], hasLines: el.checked } };
    setState({});
  }
  else if(act==="addbrand"){
    const input = document.getElementById(`new-brand-${val}`);
    const name = input.value.trim();
    if(!name) return flash("Enter a brand name.","err");
    const origin = STATE.cigarOrigins[val];
    if((origin.brands||[]).includes(name)) return flash("That brand is already listed.","err");
    STATE.cigarOrigins = { ...STATE.cigarOrigins, [val]: { ...origin, brands: [...(origin.brands||[]), name] } };
    setState({});
    flash("Brand added.");
  }
  else if(act==="delbrand"){
    const originKey = el.dataset.origin, brand = el.dataset.brand;
    const origin = STATE.cigarOrigins[originKey];
    STATE.cigarOrigins = { ...STATE.cigarOrigins, [originKey]: { ...origin, brands: (origin.brands||[]).filter(b=>b!==brand) } };
    setState({});
    flash("Brand removed.");
  }
  else if(act==="savecigarbrands"){
    const imgs = {};
    Object.values(STATE.cigarOrigins).forEach(o=>{
      (o.brands||[]).forEach((b,i)=>{
        const fieldEl = document.getElementById(`cb-img-${o.key}-${i}`);
        if(fieldEl){
          const v = fieldEl.value.trim();
          if(v) imgs[b] = v;
        }
      });
    });
    STATE.cigarBrandImages = imgs;
    setState({});
    flash("Brand images updated.");
  }
}

/* ================= PWA install prompt + service worker ================= */
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").then(reg => {
      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        if(!newWorker) return;
        newWorker.addEventListener("statechange", () => {
          if(newWorker.state === "installed" && navigator.serviceWorker.controller){
            showUpdateBanner();
          }
        });
      });
    }).catch(()=>{});
    // Also check for an update every time the app is opened/foregrounded.
    navigator.serviceWorker.getRegistration().then(reg => { if(reg) reg.update(); });
    document.addEventListener("visibilitychange", () => {
      if(document.visibilityState === "visible"){
        navigator.serviceWorker.getRegistration().then(reg => { if(reg) reg.update(); });
        // Only auto-refresh for customer (member) sessions — never for admin, since
        // this would interrupt someone actively typing into a Back Office form.
        if(STATE.session && STATE.session.type === "member"){ pullShared(false).then(()=>render()); }
      }
    });
  });
}
function showUpdateBanner(){
  const banner = document.getElementById("install-banner");
  if(!banner) return;
  banner.innerHTML = `<div class="install-banner">
    <span>A new version of the app is ready.</span>
    <button id="do-update">Update Now</button>
  </div>`;
  const btn = document.getElementById("do-update");
  if(btn) btn.addEventListener("click", () => window.location.reload());
}
let deferredInstallPrompt = null;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  const banner = document.getElementById("install-banner");
  if(banner) banner.innerHTML = `<div class="install-banner">
    <span>Install this app on your phone for one-tap access.</span>
    <button id="do-install">Install</button>
  </div>`;
  const btn = document.getElementById("do-install");
  if(btn) btn.addEventListener("click", async ()=>{
    banner.innerHTML="";
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
  });
});
function isIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent); }
function isStandalone(){ return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true; }

async function boot(){
  document.getElementById("root").innerHTML =
    `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#C9A15C;font-family:Georgia,serif;letter-spacing:1px">Loading the Reserve…</div>`;

  // The Proprietor passcode only ever lives in memory, never saved to the device.
  // A page reload wipes it — but the "logged in as admin" session can survive the
  // reload via local storage. Without this check, that combination silently breaks
  // every save (nothing reaches the server) while looking completely normal.
  if(STATE.session && STATE.session.type === "admin" && !ADMIN_PASSCODE){
    STATE.session = null;
    dbSet("pr_session", null);
  }

  const ok = await pullShared(false);
  if(!ok){
    // Couldn't reach the database — show what's cached locally on this device and stop.
    // Never push local/default data back to the server here: doing so could overwrite
    // real shared data with a stale or seed-only copy just because this one device
    // couldn't connect at this moment.
    flash("Couldn't reach the server — showing the last saved copy on this device.", "err");
  }
  if((STATE.homeLinks||[]).length < 8){
    while(STATE.homeLinks.length < 8) STATE.homeLinks.push({ label: "", image: "", target: "" });
  }

  const params = new URLSearchParams(window.location.search);
  if(params.get("order_success") === "1" && params.get("session_id") && STATE.session){
    document.getElementById("root").innerHTML =
      `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#C9A15C;font-family:Georgia,serif;letter-spacing:1px">Confirming your payment…</div>`;
    try{
      const res = await fetch(`/.netlify/functions/verify-order?session_id=${encodeURIComponent(params.get("session_id"))}`);
      const data = await res.json();
      window.history.replaceState({}, "", window.location.pathname);
      if(data.paid && data.order){
        STATE.cart = {};
        STATE.lastOrder = data.order;
        STATE.storeScreen = "confirm";
        await pullShared(false); // pick up the updated stock/orders this payment just wrote
      } else {
        STATE.storeScreen = "cart";
        flash("We couldn't confirm that payment yet — check the Orders tab shortly, or contact support if it doesn't appear.", "err");
      }
    }catch(e){
      window.history.replaceState({}, "", window.location.pathname);
      flash("We couldn't confirm that payment — please check your email or contact support.", "err");
    }
  } else if(params.get("order_cancelled") === "1"){
    window.history.replaceState({}, "", window.location.pathname);
    if(STATE.session) STATE.storeScreen = "cart";
    flash("Checkout cancelled — your cart is still here.", "err");
  }

  if(STATE.session){
    try{ history.replaceState(navSnapshot(), "", location.href); }catch(e){}
  }
  render();
}
boot();
// iOS has no install prompt event — show manual instructions once, if not already installed.
if(isIOS() && !isStandalone()){
  const banner = document.getElementById("install-banner");
  if(banner) banner.innerHTML = `<div class="install-banner">
    <span>On iPhone: tap Share, then "Add to Home Screen".</span>
    <button id="dismiss-ios">Got it</button>
  </div>`;
  const dbtn = document.getElementById("dismiss-ios");
  if(dbtn) dbtn.addEventListener("click", ()=>{ document.getElementById("install-banner").innerHTML=""; });
}
</script>
