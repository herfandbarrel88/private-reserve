name: Backup Database

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 3am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch a full database snapshot
        run: |
          mkdir -p backups
          curl -s "https://njlrcamdlghcvzkwpbff.supabase.co/rest/v1/app_data?select=*" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -o "backups/backup-$(date +%Y-%m-%d).json"

      - name: Commit the backup
        run: |
          git config user.name "backup-bot"
          git config user.email "backup-bot@users.noreply.github.com"
          git add backups/
          git commit -m "Automated backup $(date +%Y-%m-%d)" || echo "Nothing changed, skipping commit"
          git push
